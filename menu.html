<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Tummy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
<!-- Top Navigation Bar -->
<nav class="tbar">
  <div class="brand">
    <a href="home.html">
      <img class="logo" src="images/Logo.png" alt="Logo"/>
    </a>
  </div>

  <ul class="navL">
    <li><a href="home.html">Home</a></li>
    <li><a href="menu.html">Menu</a></li>
    <li><a href="offers.html">Offers</a></li>
    <li><a href="location.html">Location</a></li>
    <li><a href="about.html">About us</a></li>
  </ul>

  <div class="orderB-wrapper">
    <button class="orderB">Order now</button>
  </div>
</nav>

  <h1 class="title">Menu</h1>
  <div class="menu-page">
  <!-- Category Tabs -->
  <div class="category-wrapper">
    <div class="category-tabs" id="categoryTabs">
      <button class="cat-btn active" onclick="filterMenu('Full Meal')">Full Meal</button>
      <button class="cat-btn" onclick="filterMenu('Burgers')">Burgers</button>
      <button class="cat-btn" onclick="filterMenu('Tacos')">Tacos</button>
      <button class="cat-btn" onclick="filterMenu('Sweets')">Sweets</button>
      <button class="cat-btn" onclick="filterMenu('Drinks')">Drinks</button>
    </div>
  </div>

  <!-- Category Title -->
  <h2 class="cat-title" id="catTitle">Full Meal</h2>
  <p class="cat-subtitle" id="catSubtitle">Category</p>

  <!-- Menu Cards -->
  <div class="menu-cards" id="menuCards"></div>
</div>

<!-- Item View Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <img id="modalImg" src="" alt=""/>
    <div class="modal-info">
      <h2 id="modalName"></h2>
      <p id="modalCategory"></p>
      <button class="orderB modal-order">Order Now</button>
    </div>
  </div>
</div>

<script src = "scripts/script.js"></script>

<!-- Footer -->
<footer class="footer"> 
  <div class="footer-top">

    <div class="footer-brand">
      <img src="images/Logo.png" alt="Load Tummy Logo"/>
    </div>

    <div class="footer-col">
      <h4>How to Order</h4>
      <ul>
        <li><a href="menu.html">View Menu</a></li>
        <li><a href="location.html">Locations</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h4>Offers</h4>
      <ul>
        <li><a href="offers.html">All Offers</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h4>About Us</h4>
      <ul>
        <li><a href="about.html">About Load Tummy</a></li>
      </ul>
    </div>

  </div>

  <div class="footer-bottom">
    <p>Copyright &copy; 2026 Load Tummy. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
